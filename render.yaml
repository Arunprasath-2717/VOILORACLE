services:
  - type: web
    name: kronaxis-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker backend.api:app --bind 0.0.0.0:$PORT
    envVars:
      - key: KRONAXIS_LIGHT_MODE
        value: "false" # Set to true if further fallback is needed
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PYTHON_MAX_THREADS
        value: "1"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
